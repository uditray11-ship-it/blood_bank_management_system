services:
  
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mydb
      - JWT_SECRET=secret
    depends_on: 
      - mongodb

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: